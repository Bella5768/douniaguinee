{% extends 'base.html' %}

{% block title %}Merci — DounIA{% endblock %}

{% block content %}
<section class="bg-light-custom" style="min-height: 80vh; display:flex; align-items:center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="report-card" style="padding: 2.5rem;">
                    <div class="text-center">
                        <i class="bi bi-check-circle" style="font-size: 3.5rem; color: var(--primary);"></i>
                        <h2 class="mt-3 mb-2" style="color: var(--primary); font-weight: 800;">Merci pour votre inscription</h2>
                        <p class="text-muted mb-4" style="font-size: 1.05rem;">Nous avons bien reçu votre demande. Nous vous contacterons via WhatsApp ou email.</p>
                        <a href="/" class="btn btn-accent btn-lg">
                            <i class="bi bi-house-door me-2"></i>Retour à l'accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
